version: '3.8'

services:

  # ─── MongoDB principal (dados reais) ───────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: tinder_ufs_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: TINDER
    volumes:
      - mongo_data:/data/db
    networks:
      - tinder_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

