spring:
  application:
    name: Tinder_ufs
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/TINDER}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
      enabled: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid, profile, email
            redirect-uri: ${BASE_URL:http://localhost:8080}/login/oauth2/code/google

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:HQSyRuiN5787c9WGlabcz8oj5rCpxfiAP8KiivHMGSr2qAXZre7iI5z8ZAz1BXw+}

google:
  drive:
    application-name: Pairup
    folder-id: ${GOOGLE_DRIVE_FOLDER_ID:1gw8D9lBqbps_AQ6cdaf4LaeZdYr4pFmw}

file:
  compress:
    width: 800
    height: 800
    quality: 0.7

logging:
  level:
    com.example.Tinder_ufs: DEBUG
    com.google.api: WARN
    org.mongodb.driver: INFO

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html