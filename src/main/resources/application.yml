spring:
  application:
    name: Tinder_ufs

  data:
    mongodb:
      host: ${SPRING_DATA_MONGODB_HOST:localhost}
      port: ${SPRING_DATA_MONGODB_PORT:27017}
      database: ${SPRING_DATA_MONGODB_DATABASE:TINDER}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true

  # NOVO: Google OAuth2 Login
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, profile, email

server:
  port: 8080

google:
  drive:
    application-name: TinderUFS
    folder-id: "1gw8D9lBqbps_AQ6cdaf4LaeZdYr4pFmw"

file:
  compress:
    width: 800
    height: 800
    quality: 0.7

logging:
  level:
    com.example.Tinder_ufs: DEBUG
    com.google.api: WARN

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
