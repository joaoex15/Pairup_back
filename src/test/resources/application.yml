spring:
  application:
    name: Tinder_ufs
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/TINDER}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 30MB
      enabled: true
      resolve-lazily: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
              - openid
            redirect-uri: ${BASE_URL}/login/oauth2/code/google
            client-name: Google
            authorization-grant-type: authorization_code
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
  forward-headers-strategy: native
  tomcat:
    connection-timeout: 20000
    max-http-form-post-size: 30MB
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

railway:
  bucket:
    endpoint: ${RAILWAY_BUCKET_ENDPOINT}
    access-key: ${RAILWAY_BUCKET_ACCESS_KEY}
    secret-key: ${RAILWAY_BUCKET_SECRET_KEY}
    region: ${RAILWAY_BUCKET_REGION:us-east-1}
    name: ${RAILWAY_BUCKET_NAME}
    public-url: ${RAILWAY_BUCKET_PUBLIC_URL}

app:
  security:
    max-images-per-user: 10
    max-file-size-mb: 5
    allowed-image-types:
      - image/jpeg
      - image/png
      - image/webp
      - image/gif
    rate-limit:
      upload-per-minute: 5
      download-per-minute: 30
    image:
      folder-base: tinder_ufs
  cors:
    allowed-origins: ${FRONTEND_URL}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true

# Compressão de imagens (usado pelo ImageCompressionUtil)
file:
  compress:
    width: 800
    height: 800
    quality: 0.7

logging:
  level:
    com.example.Tinder_ufs: INFO
    org.springframework.security: INFO
    software.amazon.awssdk: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always